<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMS 2.1 Design System</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root, [data-brand="jk"] {
  --bg: #FFFFFF; --surface1: #F8F9FA; --surface2: #F1F3F5; --surface3: #E9ECEF;
  --border1: #E2E6E8; --border2: #D1D6DA;
  --text1: #131618; --text2: #495057; --text3: #86919A;
  --accent: #1B55F6; --accent-subtle: #EEF3FF;
  --brand-radius-md: 10px; --brand-radius-sm: 8px;
}
[data-brand="am"] {
  --accent: #FF6D12; --accent-subtle: #FFF6EE;
  --brand-radius-md: 16px; --brand-radius-sm: 10px;
}
[data-brand="jp"] {
  --accent: #00C66C; --accent-subtle: #EEFFF6;
  --brand-radius-md: 10px; --brand-radius-sm: 8px;
}
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text1); line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* ===== HEADER ===== */
.header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border1); padding: 0 24px; height: 56px; display: flex; align-items: center; }
.header-inner { max-width: 1600px; width: 100%; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
.logo { font-size: 18px; font-weight: 700; color: var(--accent); text-decoration: none; white-space: nowrap; }
.header-search { flex: 1; max-width: 320px; margin-left: 24px; position: relative; }
.header-search input { width: 100%; background: var(--surface2); border: 1px solid var(--border1); border-radius: 8px; padding: 6px 12px 6px 32px; color: var(--text1); font-size: 13px; font-family: inherit; outline: none; }
.header-search input:focus { border-color: var(--accent); }
.header-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; width: 18px; height: 18px; opacity: .45; }
.brand-switcher { display: flex; gap: 2px; margin-left: auto; background: var(--surface2); border-radius: 8px; padding: 2px; }
.brand-btn { border: none; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; background: transparent; color: var(--text3); transition: all .15s; }
.brand-btn:hover { color: var(--text2); }
.brand-btn.active { color: #fff; }
.brand-btn.active[data-val="jk"] { background: #1B55F6; }
.brand-btn.active[data-val="am"] { background: #FF6D12; }
.brand-btn.active[data-val="jp"] { background: #00C66C; }

/* ===== LAYOUT ===== */
.layout { display: flex; max-width: 1600px; margin: 0 auto; min-height: calc(100vh - 56px); }
.sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border1); padding: 20px 0; overflow-y: auto; position: sticky; top: 56px; height: calc(100vh - 56px); }
.main { flex: 1; padding: 32px 40px 80px; min-width: 0; }
@media (max-width: 768px) { .sidebar { display: none; } .main { padding: 20px 16px 60px; } }

/* ===== SIDEBAR ===== */
.sidebar-group { margin-bottom: 8px; }
.sidebar-label { font-size: 12px; font-weight: 700; letter-spacing: 0.3px; color: var(--text1); padding: 16px 20px 6px; }
.sidebar-group + .sidebar-group .sidebar-label { border-top: 1px solid var(--border1); margin-top: 8px; padding-top: 20px; }
.sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 20px 7px 28px; font-size: 13px; color: var(--text3); cursor: pointer; transition: all .1s; text-decoration: none; border-left: 2px solid transparent; font-weight: 400; }
.sidebar-item:hover { color: var(--text1); background: var(--surface2); }
.sidebar-item.active { color: var(--accent); background: var(--accent-subtle); border-left-color: var(--accent); font-weight: 600; }
.sidebar-item .badge { font-size: 10px; background: var(--surface3); color: var(--text3); padding: 1px 6px; border-radius: 4px; margin-left: auto; }
.sidebar-item.hidden { display: none; }

/* ===== CONTENT ===== */
.page-header { margin-bottom: 32px; }
.page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.page-desc { font-size: 15px; color: var(--text2); max-width: 640px; }
.section-title { font-size: 18px; font-weight: 600; margin: 40px 0 16px; color: var(--text1); }
.section-title:first-of-type { margin-top: 0; }

/* ===== OVERVIEW CARDS ===== */
.overview-cat { margin-bottom: 40px; }
.overview-cat-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.overview-cat-title .count { font-size: 12px; color: var(--text3); font-weight: 400; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.overview-card { background: var(--surface1); border: 1px solid var(--border1); border-radius: 10px; cursor: pointer; transition: all .15s; overflow: hidden; text-decoration: none; color: inherit; }
.overview-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
.overview-card-head { padding: 12px 16px; border-bottom: 1px solid var(--border1); font-size: 14px; font-weight: 600; }
.overview-card-body { padding: 16px; height: 100px; display: flex; align-items: center; justify-content: center; background: var(--surface2); }

/* ===== DATA CARD ===== */
.card { background: var(--surface1); border: 1px solid var(--border1); border-radius: 10px; padding: 20px; margin-bottom: 16px; }

/* ===== TABLE ===== */
.spec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.spec-table th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text3); border-bottom: 1px solid var(--border2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.spec-table td { padding: 10px 12px; border-bottom: 1px solid var(--border1); color: var(--text2); vertical-align: middle; }
.spec-table tr:hover td { background: rgba(255,255,255,.02); }
.token { font-family: 'Pretendard', monospace; font-size: 12px; color: var(--accent); cursor: pointer; padding: 2px 6px; border-radius: 4px; background: var(--accent-subtle); }
.token:hover { opacity: .8; }
.cdot { display: inline-block; width: 16px; height: 16px; border-radius: 4px; vertical-align: middle; margin-right: 6px; border: 1px solid rgba(255,255,255,.08); }

/* ===== PREVIEW ===== */
.preview-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 16px; }
.preview-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.spec-dl { display: grid; grid-template-columns: 140px 1fr; gap: 4px 16px; font-size: 13px; }
.spec-dl dt { color: var(--text3); font-weight: 500; }
.spec-dl dd { color: var(--text2); }

/* ===== PANTONE CHIPS ===== */
.palette-group { margin-bottom: 28px; }
.palette-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text1); }
.chip-row { display: flex; gap: 10px; flex-wrap: wrap; }
.pantone-chip {
  width: 88px; cursor: pointer; transition: transform .15s, box-shadow .15s;
  border-radius: 8px; overflow: hidden; background: var(--bg);
  border: 1px solid var(--border1);
}
.pantone-chip:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,.08); z-index: 1; }
.pantone-chip-color { width: 100%; height: 80px; }
.pantone-chip-info { padding: 8px 8px 10px; }
.pantone-chip-step { font-size: 13px; font-weight: 700; color: var(--text1); line-height: 1; }
.pantone-chip-hex { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: 'Pretendard', monospace; letter-spacing: -0.2px; }

/* ===== ICON GRID ===== */
.icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 6px; }
.icon-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 4px; background: var(--surface2); border-radius: 8px; cursor: pointer; transition: background .1s; }
.icon-cell:hover { background: var(--surface3); }
.icon-cell img { opacity: .85; }
.icon-cell span { font-size: 9px; color: var(--text3); text-align: center; word-break: break-all; line-height: 1.2; }

/* ===== TYPO ===== */
.typo-row { display: flex; align-items: baseline; gap: 20px; padding: 14px 0; border-bottom: 1px solid var(--border1); }
.typo-meta { min-width: 160px; font-size: 11px; color: var(--text3); flex-shrink: 0; }
.typo-sample { color: var(--text1); }

/* ===== SPACING ===== */
.sp-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
.sp-bar { height: 20px; background: var(--accent); border-radius: 3px; min-width: 2px; }
.sp-label { font-size: 12px; color: var(--text3); min-width: 100px; }
.sp-val { font-size: 12px; color: var(--text2); }

/* ===== RADIUS ===== */
.radius-row { display: flex; gap: 16px; flex-wrap: wrap; }
.radius-item { text-align: center; }
.radius-box { width: 72px; height: 72px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text2); background: var(--surface1); }
.radius-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ===== TAG ===== */
.tag-money { display: inline-flex; align-items: center; gap: 2px; height: 20px; padding: 0 6px; border-radius: 4px; font-size: 11px; font-weight: 600; line-height: 18px; white-space: nowrap; }

/* ===== INTERACTIVE BUTTONS ===== */
.btn-demo { font-family: inherit; cursor: pointer; transition: box-shadow .15s, transform .1s; position: relative; }
.btn-demo:active { transform: scale(.97); }
.btn-demo.btn-primary:hover { box-shadow: inset 0 0 0 100px rgba(22,22,24,.12); }
.btn-demo.btn-secondary:hover { box-shadow: inset 0 0 0 100px rgba(22,22,24,.04); }
.btn-demo.btn-monoline:hover { box-shadow: inset 0 0 0 100px rgba(22,22,24,.12); }
.btn-demo[disabled] { cursor: not-allowed; opacity: .5; }
.btn-demo[disabled]:hover { box-shadow: none; transform: none; }

/* ===== INTERACTIVE INPUT ===== */
.input-demo { font-family: inherit; outline: none; transition: border-color .15s; }
.input-demo:focus { border-width: 2px; border-color: #131618; }
.input-demo::placeholder { color: #86919A; }

/* ===== INTERACTIVE CHECKBOX/RADIO ===== */
.check-demo { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text2); user-select: none; }
.check-demo input { display: none; }
.check-demo .box { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #E2E6E8; background: #fff; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.check-demo .box svg { opacity: 0; transition: opacity .15s; }
.check-demo input:checked + .box { border: none; }
.check-demo input:checked + .box svg { opacity: 1; }
.radio-demo { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text2); user-select: none; }
.radio-demo input { display: none; }
.radio-demo .dot-outer { width: 24px; height: 24px; border-radius: 999px; border: 1px solid #E2E6E8; background: #fff; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.radio-demo .dot-inner { width: 10px; height: 10px; border-radius: 999px; background: transparent; transition: all .15s; }
.radio-demo input:checked + .dot-outer { border-color: var(--accent); }
.radio-demo input:checked + .dot-outer .dot-inner { background: var(--accent); }

/* ===== DO/DONT ===== */
.do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .do-dont { grid-template-columns: 1fr; } }
.do-list, .dont-list { padding: 0; list-style: none; font-size: 13px; }
.do-list li, .dont-list li { padding: 6px 0; padding-left: 20px; position: relative; color: var(--text2); }
.do-list li::before { content: '\2713'; position: absolute; left: 0; color: #02B160; font-weight: 700; }
.dont-list li::before { content: '\2715'; position: absolute; left: 0; color: #F22A23; font-weight: 700; }

/* ===== TOAST ===== */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">JAMS 2.1</a>
    <div class="header-search">
      <img class="header-search-icon" src="icons/system-search.svg" alt="">
      <input type="text" id="search-input" placeholder="Search tokens, components..." oninput="handleSearch(this.value)">
    </div>
    <div class="brand-switcher">
      <button class="brand-btn active" data-val="jk" onclick="setBrand('jk')">JK</button>
      <button class="brand-btn" data-val="am" onclick="setBrand('am')">AM</button>
      <button class="brand-btn" data-val="jp" onclick="setBrand('jp')">JP</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-group">
      <div class="sidebar-label">Overview</div>
      <a class="sidebar-item active" data-page="overview">Components</a>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-label">Foundation</div>
      <a class="sidebar-item" data-page="color">Color</a>
      <a class="sidebar-item" data-page="typography">Typography</a>
      <a class="sidebar-item" data-page="spacing">Spacing & Radius</a>
      <a class="sidebar-item" data-page="icon">Icon <span class="badge">155</span></a>
      <a class="sidebar-item" data-page="shadow">Shadow & Elevation</a>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-label">Components</div>
      <a class="sidebar-item" data-page="button">Button</a>
      <a class="sidebar-item" data-page="input">Input</a>
      <a class="sidebar-item" data-page="select">Select</a>
      <a class="sidebar-item" data-page="controls">Checkbox / Radio</a>
      <a class="sidebar-item" data-page="tags">Tags & Badges</a>
    </div>
    <!-- <div class="sidebar-group">
      <div class="sidebar-label">Guidelines</div>
      <a class="sidebar-item" data-page="guidelines">Do's & Don'ts</a>
    </div> -->
  </nav>

  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
// ===== DATA =====
var themeJK={brand50:'#EEF3FF',brand300:'#82AAFF',brand500:'#1B55F6',brand700:'#0D2EA0',brand950:'#030926',rMd:10,rSm:8};
var themeAM={brand50:'#FFF6EE',brand300:'#FFAB5E',brand500:'#FF6D12',brand700:'#9A3600',brand950:'#230800',rMd:16,rSm:10};
var themeJP={brand50:'#EEFFF6',brand300:'#5CE8A6',brand500:'#00C66C',brand700:'#007842',brand950:'#001A0E',rMd:10,rSm:8};
var spacingTokens=[{n:'spacing-0.25',v:-1},{n:'spacing-0.5',v:2},{n:'spacing-1',v:4},{n:'spacing-2',v:8},{n:'spacing-3',v:12},{n:'spacing-4',v:16},{n:'spacing-5',v:20},{n:'spacing-6',v:24},{n:'spacing-7',v:28},{n:'spacing-8',v:32},{n:'spacing-9',v:36},{n:'spacing-10',v:40},{n:'spacing-12',v:48},{n:'spacing-13',v:52},{n:'spacing-14',v:56},{n:'spacing-16',v:64},{n:'spacing-20',v:80}];
var radiusTokens=[{n:'xs',v:4},{n:'sm',v:8},{n:'md',v:10},{n:'lg',v:16},{n:'xl',v:24},{n:'full',v:996}];
var typoSizes=[{role:'Heading/xl',s:32,w:700,lh:40,ls:-0.5},{role:'Heading/lg',s:28,w:700,lh:36,ls:-0.5},{role:'Heading/base',s:24,w:700,lh:32,ls:-0.5},{role:'Heading/sm',s:20,w:600,lh:28,ls:0},{role:'Heading/xs',s:18,w:600,lh:24,ls:0},{role:'Body/lg',s:17,w:400,lh:24,ls:0},{role:'Body/base',s:16,w:400,lh:22,ls:0},{role:'Body/sm',s:15,w:400,lh:22,ls:0},{role:'Body/xs',s:14,w:400,lh:20,ls:0},{role:'Caption/lg',s:13,w:500,lh:18,ls:0.2},{role:'Caption/base',s:12,w:500,lh:18,ls:0.2},{role:'Micro/size11',s:11,w:600,lh:18,ls:0}];
var tagVariants=[{n:'Red',lb:'#FFF2F1',db:'#421200',t:'#E9312A'},{n:'Orange',lb:'#FFF5EC',db:'#421200',t:'#FF6D12'},{n:'Yellow',lb:'#FFFCE8',db:'#332500',t:'#FFB700'},{n:'Gray',lb:'#F4F6F7',db:'#1E2428',t:'#86919A'},{n:'Blue',lb:'#EBF5FF',db:'#001C46',t:'#2684FF'},{n:'Blue2',lb:'#EEF3FF',db:'#06124A',t:'#1B55F6'},{n:'Violet',lb:'#F5F3FF',db:'#1D004F',t:'#7C3AED'}];
var iconInventory={'Navigation & Arrow':[{n:'back-line',f:'system-back'},{n:'arrowleft-line',f:'system-arrowleft'},{n:'arrowright-line',f:'system-arrowright'},{n:'arrowdown-line',f:'system-arrowdown'},{n:'arrowup-line',f:'system-arrowup'},{n:'arrowgoback-line',f:'system-arrowgoback'},{n:'selectarrowdown-fill',f:'system-selectarrowdown'},{n:'direction-fill',f:'system-direction'}],'Action & Edit':[{n:'close-line',f:'system-close'},{n:'check-line',f:'system-check'},{n:'plus-line',f:'system-plus'},{n:'search-line',f:'system-search'},{n:'setting-line',f:'system-setting'},{n:'modify-line',f:'system-modify'},{n:'delete-line',f:'system-delete'},{n:'copy-line',f:'system-copy'},{n:'share-line',f:'system-share'},{n:'link-line',f:'system-link'},{n:'clip-line',f:'system-clip'},{n:'filter-line',f:'system-filter'},{n:'redo-line',f:'system-redo'},{n:'capture-line',f:'system-capture'},{n:'download02-line',f:'system-download02'},{n:'logout-line',f:'system-logout'},{n:'agentsend-fill',f:'system-agentsend'},{n:'agentstop-fill',f:'system-agentstop'}],'Status & Info':[{n:'circlecheck-line',f:'system-circlecheck'},{n:'circlecheck-fill',f:'system-circlecheckfill'},{n:'closecircle-line',f:'system-closecircle'},{n:'closecircle-fill',f:'system-closecirclefilled'},{n:'info-line',f:'system-info'},{n:'exclamation-line',f:'system-exclamation'},{n:'ban-line',f:'line-ban'},{n:'loading-line',f:'system-loading'},{n:'tooltip1-fill',f:'system-tooltip1'},{n:'tooltip2-fill',f:'system-tooltip2'}],'UI & Layout':[{n:'list-line',f:'system-list'},{n:'list02-line',f:'system-list02'},{n:'menu-line',f:'system_menu'},{n:'kebab-line',f:'system_kebab'},{n:'meatball-line',f:'system-meatball'},{n:'view-line',f:'system-view'},{n:'hide-line',f:'system-hide'},{n:'mobile-line',f:'system-mobile'}],'Social':[{n:'heart-line',f:'system-heart'},{n:'heart-fill',f:'system-heart_on'},{n:'scrap-line',f:'system-scrap'},{n:'thumbsup-line',f:'system-thumbs_up'},{n:'comment-line',f:'system-comment'},{n:'mail-line',f:'system-mail'},{n:'alram-line',f:'system-alram'},{n:'message-fill',f:'system-message'}],'Place & Map':[{n:'location-line',f:'system-location'},{n:'pin-line',f:'system-pin'},{n:'map-line',f:'system-map'},{n:'home-line',f:'system-home'},{n:'company-line',f:'system-company'},{n:'school-line',f:'system-school'}],'Media':[{n:'picture-line',f:'system-picture_line'},{n:'camera-line',f:'system-camera'},{n:'memo-line',f:'system-memo'},{n:'folder-line',f:'system-folder'},{n:'video-fill',f:'system-video'},{n:'new-fill',f:'system-new'}],'Finance':[{n:'cash-line',f:'system-cash'},{n:'card-line',f:'system-card'},{n:'wallet-line',f:'system-wallet'},{n:'bankbook-line',f:'system-bankbook'},{n:'calculator-line',f:'system-calculator'},{n:'money-fill',f:'system-money'},{n:'discount-fill',f:'system-discount'}],'Date & Time':[{n:'calendar-line',f:'system-calendar'},{n:'date-line',f:'system-date'},{n:'period-line',f:'system-period'},{n:'clock-line',f:'system-clock'},{n:'recent-line',f:'system-recent'}],'People':[{n:'my-line',f:'system-my'},{n:'idcard-line',f:'system-idcard'},{n:'career-line',f:'system-career'}],'AI & Tech':[{n:'ai-line',f:'system-ai'},{n:'aisearch-line',f:'system-aisearch'},{n:'smart-line',f:'system-smart'},{n:'thunder-line',f:'system-thunder'},{n:'lock-line',f:'system-lock'},{n:'smartfit-fill',f:'system-smartfit'},{n:'trash02-line',f:'system-trash02'}]};

// ===== BRAND =====
var currentBrand=localStorage.getItem('jams-brand')||'jk';
function T(){return currentBrand==='am'?themeAM:currentBrand==='jp'?themeJP:themeJK;}
function BC(){return T().brand500;} function BS(){return T().brand50;} function BB(){return T().brand300;}
function BN(){return currentBrand.toUpperCase();} function RM(){return T().rMd;} function RS(){return T().rSm;}
function setBrand(b){currentBrand=b;localStorage.setItem('jams-brand',b);document.documentElement.setAttribute('data-brand',b);document.querySelectorAll('.brand-btn').forEach(function(x){x.classList.toggle('active',x.dataset.val===b);});renderPage(currentPage);}

// ===== UTILITY =====
function copyToken(t){navigator.clipboard.writeText(t).then(function(){showToast('Copied: '+t);});}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(function(){t.classList.remove('show');},1500);}
function wn(w){return{400:'Regular',500:'Medium',600:'Semibold',700:'Bold'}[w]||w;}

// ===== NAV =====
var currentPage='overview';
function navigate(p){currentPage=p;document.querySelectorAll('.sidebar-item').forEach(function(x){x.classList.toggle('active',x.dataset.page===p);});renderPage(p);window.scrollTo(0,0);history.replaceState(null,'',p==='overview'?'#':'#'+p);}
document.getElementById('sidebar').addEventListener('click',function(e){var item=e.target.closest('.sidebar-item');if(!item||item.getAttribute('href'))return;e.preventDefault();navigate(item.dataset.page);});
function handleSearch(q){
  q=q.toLowerCase().trim();
  var firstMatch=null;
  document.querySelectorAll('.sidebar-item').forEach(function(item){

// ===== RENDER =====
function renderPage(p){var m=document.getElementById('main');if(P[p])m.innerHTML=P[p]();}

// Checkbox interactive toggle
document.getElementById('main').addEventListener('change',function(e){
  if(e.target.closest('.check-demo')){var box=e.target.nextElementSibling;var bc=BC();if(e.target.checked){box.style.background=bc;box.style.border='none';}else{box.style.background='#fff';box.style.border='1px solid #E2E6E8';}}
});

// ===== INPUT INTERACTIVE =====
document.getElementById('main').addEventListener('focusin',function(e){
  var inp=e.target;if(!inp.id||!inp.id.startsWith('input-live-'))return;
  inp.style.border='2px solid #131618';
  var st=document.getElementById(inp.id+'-state');if(st)st.textContent='State: Focus';
});
document.getElementById('main').addEventListener('input',function(e){
  var inp=e.target;if(!inp.id||!inp.id.startsWith('input-live-'))return;
  inp.style.border='2px solid #131618';
  var st=document.getElementById(inp.id+'-state');if(st)st.textContent='State: Pressed';
});
document.getElementById('main').addEventListener('focusout',function(e){
  var inp=e.target;if(!inp.id||!inp.id.startsWith('input-live-'))return;
  var hasVal=inp.value.trim().length>0;
  inp.style.border='1px solid #E2E6E8';
  var st=document.getElementById(inp.id+'-state');
  if(st)st.textContent=hasVal?'State: Filled':'State: Default';
});

// ===== SELECT INTERACTIVE =====
document.getElementById('main').addEventListener('click',function(e){
  var bc=BC(),bs=BS();
  // trigger click
  var trigger=e.target.closest('.select-trigger');
  if(trigger){
    var id=trigger.id;
    var dd=document.getElementById(id+'-dropdown');
    var arrow=trigger.querySelector('.select-arrow');
    var st=document.getElementById(id+'-state');
    var isOpen=dd.style.display!=='none';
    // close all others
    document.querySelectorAll('.select-dropdown').forEach(function(d){d.style.display='none';});
    document.querySelectorAll('.select-trigger').forEach(function(t){t.style.border='1px solid #E2E6E8';var a=t.querySelector('.select-arrow');if(a)a.style.transform='';});
    if(!isOpen){
      dd.style.display='block';
      trigger.style.border='2px solid #131618';
      if(arrow)arrow.style.transform='rotate(180deg)';
      if(st)st.textContent='State: Open';
    }else{
      var hasVal=trigger.querySelector('.select-text').style.color!=='rgb(134, 145, 154)';
      if(st)st.textContent=hasVal?'State: Filled':'State: Default';
    }
    return;
  }
  // option click
  var opt=e.target.closest('.select-option');
  if(opt){
    var triggerId=opt.dataset.trigger;
    var triggerEl=document.getElementById(triggerId);
    var textEl=triggerEl.querySelector('.select-text');
    textEl.textContent=opt.textContent;
    textEl.style.color='#131618';
    textEl.style.fontWeight='500';
    var dd2=document.getElementById(triggerId+'-dropdown');
    dd2.style.display='none';
    triggerEl.style.border='1px solid #E2E6E8';
    var arrow2=triggerEl.querySelector('.select-arrow');
    if(arrow2)arrow2.style.transform='';
    // highlight selected
    dd2.querySelectorAll('.select-option').forEach(function(o){o.style.background='';o.style.color='';o.style.fontWeight='';});
    opt.style.background=BS();opt.style.color=BC();opt.style.fontWeight='600';
    var st2=document.getElementById(triggerId+'-state');
    if(st2)st2.textContent='State: Filled';
    return;
  }
  // click outside closes selects
  document.querySelectorAll('.select-dropdown').forEach(function(d){d.style.display='none';});
  document.querySelectorAll('.select-trigger').forEach(function(t){
    t.style.border='1px solid #E2E6E8';
    var a=t.querySelector('.select-arrow');if(a)a.style.transform='';
  });
});
// select option hover
document.getElementById('main').addEventListener('mouseover',function(e){
  var opt=e.target.closest('.select-option');
  if(opt&&!opt.style.fontWeight){opt.style.background=BS();opt.style.color=BC();}
});
document.getElementById('main').addEventListener('mouseout',function(e){
  var opt=e.target.closest('.select-option');
  if(opt&&!opt.style.fontWeight){opt.style.background='';opt.style.color='#131618';}
});
